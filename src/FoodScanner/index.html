<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriScan-Log In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #FAF8F3;
      --ink: #2D2A26;
      --ink-soft: #6B6459;
      --forest: #1B4332;
      --sage: #52B788;
      --sage-deep: #2D6A4F;
      --apricot: #F4A261;
      --apricot-deep: #E07A2C;
      --line: #E8E2D4;
      --card: #FFFFFF;
      --cream-2: #F1ECE0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .font-display {
      font-family: 'Fraunces', serif;
    }

    .texture {
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
      background-size: 16px 16px;
    }

    .focus-ring:focus-visible {
      outline: 2px solid var(--sage-deep);
      outline-offset: 2px;
      border-radius: 8px;
    }

    ::selection {
      background: var(--sage);
      color: white;
    }

    .auth-card {
      width: 410px;
      max-width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px -16px rgba(27, 67, 50, 0.18);
    }

    .auth-hero {
      background:
        radial-gradient(circle at 85% 0%, rgba(255, 255, 255, 0.14), transparent 50%),
        linear-gradient(135deg, var(--forest) 0%, var(--sage-deep) 100%);
      padding: 2.5rem 2rem 2.25rem;
      position: relative;
      overflow: hidden;
    }

    .bowl-illustration {
      display: block;
      margin: 0 auto;
    }

    .field-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
      display: block;
    }

    .field-input {
      width: 100%;
      border-radius: 14px;
      border: 1.5px solid var(--line);
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field-input::placeholder {
      color: #B6AFA2;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--sage-deep);
      box-shadow: 0 0 0 4px rgba(82, 183, 136, 0.15);
    }

    .btn-primary {
      width: 100%;
      background: var(--forest);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 14px;
      padding: 0.95rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-primary:hover {
      background: var(--sage-deep);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .link-accent {
      color: var(--sage-deep);
      font-weight: 600;
      text-decoration: none;
    }

    .link-accent:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="auth-card">

    <div class="auth-hero texture">
      <img class="w-20 h-20 block mx-auto" src="logo.png">


      <h1 class="font-display font-semibold text-3xl text-center text-white mt-4">NutriScan</h1>
      <p class="text-center text-white text-opacity-85 text-sm mt-1.5 tracking-wide">SCAN · ANALYZE · EAT WELL</p>
    </div>

    <div class="p-8">
      <h2 class="font-display font-semibold text-2xl" style="color:var(--ink)">Welcome back</h2>
      <p class="text-sm mt-1" style="color:var(--ink-soft)">Log in to pick up where you left off.</p>

      <form class="mt-7">
        <div class="mb-5">
          <label for="email" class="field-label">Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" class="field-input focus-ring"
            autocomplete="email">
        </div>

        <div class="mb-3">
          <label for="password" class="field-label">Password</label>
          <input id="loginPassword" type="password" placeholder="Enter your password" class="field-input focus-ring"
            autocomplete="current-password">
        </div>

        <div class="text-right mb-6">
          <a href="#" class="text-sm link-accent">Forgot password?</a>
        </div>
        <div id="loginMessage"
          style="position:fixed; bottom:1.75rem; left:50%; transform:translateX(-50%) translateY(12px); background:#1B4332; color:#fff; padding:0.7rem 1.4rem; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:500; opacity:0; pointer-events:none; z-index:60; transition:opacity 0.22s ease, transform 0.22s ease;"
          role="status" aria-live="polite"></div>
        <button type="button" class="btn-primary focus-ring" onclick="login()">Log in</button>
      </form>

      <p class="text-center mt-7 text-sm" style="color:var(--ink-soft)">
        Don't have an account?
        <a href="register.html" class="link-accent">Create one</a>
      </p>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
