<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriScan — Create Account</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #FAF8F3;
      --ink: #2D2A26;
      --ink-soft: #6B6459;
      --forest: #1B4332;
      --sage: #52B788;
      --sage-deep: #2D6A4F;
      --apricot: #F4A261;
      --apricot-deep: #E07A2C;
      --line: #E8E2D4;
      --card: #FFFFFF;
      --cream-2: #F1ECE0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .font-display {
      font-family: 'Fraunces', serif;
    }

    .texture {
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
      background-size: 16px 16px;
    }

    .focus-ring:focus-visible {
      outline: 2px solid var(--sage-deep);
      outline-offset: 2px;
      border-radius: 8px;
    }

    ::selection {
      background: var(--sage);
      color: white;
    }

    .auth-card {
      width: 420px;
      max-width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px -16px rgba(27, 67, 50, 0.18);
    }

    .auth-hero {
      background:
        radial-gradient(circle at 85% 0%, rgba(255, 255, 255, 0.14), transparent 50%),
        linear-gradient(135deg, var(--forest) 0%, var(--sage-deep) 100%);
      padding: 2.25rem 2rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .bowl-illustration {
      display: block;
      margin: 0 auto;
    }

    .field-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
      display: block;
    }

    .field-input {
      width: 100%;
      border-radius: 14px;
      border: 1.5px solid var(--line);
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field-input::placeholder {
      color: #B6AFA2;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--sage-deep);
      box-shadow: 0 0 0 4px rgba(82, 183, 136, 0.15);
    }

    .btn-primary {
      width: 100%;
      background: var(--forest);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 14px;
      padding: 0.95rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-primary:hover {
      background: var(--sage-deep);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .link-accent {
      color: var(--sage-deep);
      font-weight: 600;
      text-decoration: none;
    }

    .link-accent:hover {
      text-decoration: underline;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
    }

    .check-box {
      appearance: none;
      width: 19px;
      height: 19px;
      border-radius: 6px;
      border: 1.5px solid var(--line);
      background: #fff;
      margin-top: 1px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .check-box:checked {
      background: var(--forest);
      border-color: var(--forest);
    }

    .check-box:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
  </style>
</head>

<body>

  <div class="auth-card">

    <div class="auth-hero texture">
      <img class="w-20 h-20 block mx-auto" src="logo.png">

      <h1 class="font-display font-semibold text-3xl text-center text-white mt-3">NutriScan</h1>
      <p class="text-center text-white text-opacity-85 text-sm mt-1.5 tracking-wide">START YOUR HEALTHY JOURNEY</p>
    </div>

    <div class="p-8">
      <h2 class="font-display font-semibold text-2xl" style="color:var(--ink)">Create your account</h2>
      <p class="text-sm mt-1" style="color:var(--ink-soft)">Takes less than a minute to get started.</p>

      <form class="mt-7" id="register-form" novalidate>

        <div class="mb-5">
          <label for="registerEmail" class="field-label">Email</label>
          <input id="registerEmail" name="email" type="email" placeholder="you@example.com"
            class="field-input focus-ring" autocomplete="email" required>
        </div>

        <div class="mb-5">
          <label for="registerPassword" class="field-label">Password</label>
          <input id="registerPassword" name="password" type="password" placeholder="Create a password"
            class="field-input focus-ring" autocomplete="new-password" required minlength="8">
        </div>

        <button type="submit" class="btn-primary focus-ring" id="register-btn">Create account</button>
        <div id="registerMessage" style="position:fixed; bottom:1.75rem; left:50%; transform:translateX(-50%) translateY(12px); padding:0.7rem 1.4rem; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:500; color:#fff; opacity:0; pointer-events:none; z-index:60; transition:opacity 0.22s ease, transform 0.22s ease;" role="status" aria-live="polite"></div>
      </form>

      <p class="text-center mt-7 text-sm" style="color:var(--ink-soft)">
        Already have an account?
        <a href="index.html" class="link-accent">Log in</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
